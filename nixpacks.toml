# nixpacks.toml - Fixed
[phases.setup]
nixPkgs = ["python310", "python310Packages.pip", "sqlite"]

[phases.install]
cmds = ["pip install --no-cache-dir -r requirements.txt --timeout=100"]

[phases.start]
cmd = "python3 main.py"

[deploy]
healthcheck = "/"
restartPolicy = "on-failure"
restartMaxRetries = 10
